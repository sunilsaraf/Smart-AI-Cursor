apiVersion: apps/v1
kind: Deployment
metadata:
  name: codepilot-worker
  labels:
    app: codepilot-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codepilot-worker
  template:
    metadata:
      labels:
        app: codepilot-worker
    spec:
      containers:
      - name: worker
        image: codepilot/worker:latest
        env:
        - name: NODE_ENV
          value: "production"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: codepilot-secrets
              key: redis-url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: codepilot-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: codepilot-secrets
              key: openai-api-key
        - name: WORKER_CONCURRENCY
          value: "5"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "4000m"
